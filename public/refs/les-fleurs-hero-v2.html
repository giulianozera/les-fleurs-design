<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Les Fleurs Design — Not Just For Her.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f4ead6;
    color: #2a1f12;
    overflow: hidden;
  }

  /* ---- STAGE: warm cream with architectural restraint ---- */
  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(ellipse at center top, #faf2e0 0%, #ebdfc4 60%, #ddcdb0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 5vw;
  }

  /* ---- EYEBROW (always visible — it's the brand frame) ---- */
  .eyebrow {
    position: absolute;
    top: 8vh;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #5a4530;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.3s forwards;
  }

  /* ---- ROSE (small, ornamental, sits above the title like a heraldic mark) ---- */
  .rose-wrap {
    width: 220px;
    height: 220px;
    margin-bottom: 2.5vh;
    flex-shrink: 0;
  }
  .rose { width: 100%; height: 100%; }
  .ring { transform-origin: center; opacity: 0; transform-box: fill-box; }
  /* Slow, smooth deceleration — no overshoot, no spring */
  .r1   { animation: bloom 2.0s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both; }
  .r2   { animation: bloom 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both; }
  .r3   { animation: bloom 1.6s cubic-bezier(0.22, 1, 0.36, 1) 1.1s both; }
  .core { animation: bloom 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.5s both; transform-origin: center; }
  @keyframes bloom {
    0%   { transform: scale(0.4) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ---- SPARSE DRIFTING PETALS (whispered, not a storm) ---- */
  .rain {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .fp {
    position: absolute;
    top: -40px;
    width: 12px; height: 16px;
    border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
    opacity: 0;
    animation-name: drift;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  @keyframes drift {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.45; }
    90%  { opacity: 0.45; }
    100% { transform: translateY(110vh) translateX(var(--dx)) rotate(360deg); opacity: 0; }
  }

  /* ---- HEADLINE (their actual H1) ---- */
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(42px, 6.5vw, 84px);
    letter-spacing: 0.01em;
    line-height: 1.05;
    color: #2a1f12;
    text-align: center;
    margin-bottom: 2.5vh;
    max-width: 14ch;
    opacity: 0;
    animation: fadeIn 1.5s ease 2.0s forwards;
  }

  /* ---- SUBHEAD (their actual subhead) ---- */
  .subhead {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(15px, 1.4vw, 18px);
    line-height: 1.55;
    color: #5a4530;
    text-align: center;
    max-width: 56ch;
    margin-bottom: 4vh;
    opacity: 0;
    animation: fadeIn 1.5s ease 2.6s forwards;
  }

  /* ---- DUAL CTAS (matching their actual buttons) ---- */
  .ctas {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 1.5s ease 3.2s forwards;
  }
  .cta {
    padding: 14px 32px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 0;
    transition: background .4s, color .4s, border-color .4s;
    text-decoration: none;
    display: inline-block;
  }
  .cta-primary {
    background: #2a1f12;
    color: #f4ead6;
    border: 1px solid #2a1f12;
  }
  .cta-primary:hover { background: #1a1208; border-color: #1a1208; }
  .cta-secondary {
    background: transparent;
    color: #2a1f12;
    border: 1px solid #2a1f12;
  }
  .cta-secondary:hover { background: #2a1f12; color: #f4ead6; }

  /* ---- SCROLL HINT (matches their site) ---- */
  .scroll-hint {
    position: absolute;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #8a7a5e;
    opacity: 0;
    animation: fadeIn 1.5s ease 3.8s forwards;
  }
  .scroll-hint::after {
    content: '';
    display: block;
    width: 1px;
    height: 28px;
    background: #8a7a5e;
    margin: 8px auto 0;
    opacity: 0.5;
  }

  /* ---- REPLAY ---- */
  .replay {
    position: absolute;
    top: 20px; right: 20px;
    padding: 8px 14px;
    background: transparent;
    border: 1px solid rgba(42, 31, 18, 0.25);
    color: #5a4530;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 0;
    z-index: 10;
    transition: background .3s;
  }
  .replay:hover { background: rgba(42, 31, 18, 0.06); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- ACCESSIBILITY: respect reduced-motion ---- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .fp { display: none; }
  }

  /* ---- MOBILE TIGHTENING ---- */
  @media (max-width: 640px) {
    .rose-wrap { width: 160px; height: 160px; }
    .eyebrow { top: 5vh; font-size: 10px; letter-spacing: 0.35em; }
    .scroll-hint { display: none; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <p class="eyebrow">Maison Florale — Miami</p>

  <!-- Continuous drifting petals (sparse, slow, ivory-only) -->
  <div class="rain" id="rain" aria-hidden="true"></div>

  <!-- The rose: small ornamental device above the headline -->
  <div class="rose-wrap" aria-hidden="true">
    <svg class="rose" viewBox="-110 -110 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="po" d="M0,0 C-22,-8 -32,-32 -18,-58 C-10,-72 10,-72 18,-58 C32,-32 22,-8 0,0 Z" transform="translate(0,-10)"/>
        <path id="pm" d="M0,0 C-18,-6 -26,-26 -14,-46 C-8,-56 8,-56 14,-46 C26,-26 18,-6 0,0 Z" transform="translate(0,-6)"/>
        <path id="pi" d="M0,0 C-14,-4 -20,-20 -10,-34 C-5,-42 5,-42 10,-34 C20,-20 14,-4 0,0 Z" transform="translate(0,-4)"/>
      </defs>
      <!-- Outer ring: palest cream -->
      <g class="ring r1">
        <use href="#po" fill="#f5ebd8"/>
        <use href="#po" fill="#ecdfc2" transform="rotate(60)"/>
        <use href="#po" fill="#f5ebd8" transform="rotate(120)"/>
        <use href="#po" fill="#ecdfc2" transform="rotate(180)"/>
        <use href="#po" fill="#f5ebd8" transform="rotate(240)"/>
        <use href="#po" fill="#ecdfc2" transform="rotate(300)"/>
      </g>
      <!-- Middle ring: light champagne -->
      <g class="ring r2" transform="rotate(30)">
        <use href="#pm" fill="#d6c298"/>
        <use href="#pm" fill="#c2ad7d" transform="rotate(60)"/>
        <use href="#pm" fill="#d6c298" transform="rotate(120)"/>
        <use href="#pm" fill="#c2ad7d" transform="rotate(180)"/>
        <use href="#pm" fill="#d6c298" transform="rotate(240)"/>
        <use href="#pm" fill="#c2ad7d" transform="rotate(300)"/>
      </g>
      <!-- Inner ring: darker champagne -->
      <g class="ring r3">
        <use href="#pi" fill="#968058"/>
        <use href="#pi" fill="#7a6745" transform="rotate(72)"/>
        <use href="#pi" fill="#968058" transform="rotate(144)"/>
        <use href="#pi" fill="#7a6745" transform="rotate(216)"/>
        <use href="#pi" fill="#968058" transform="rotate(288)"/>
      </g>
      <!-- Center: deep warm brown -->
      <circle class="ring core" r="8" fill="#4a3825"/>
      <circle class="ring core" r="3" fill="#2a1f12"/>
    </svg>
  </div>

  <h1 class="headline">Not Just For Her.</h1>

  <p class="subhead">
    A design piece for hotels, restaurants, and the spaces that demand
    distinction — as much as it is a gift for the woman who deserves more
    than a bouquet.
  </p>

  <div class="ctas">
    <a href="/shop" class="cta cta-primary">Shop the Collection</a>
    <a href="/wholesale" class="cta cta-secondary">For Business</a>
  </div>

  <p class="scroll-hint">Scroll</p>

  <button class="replay" onclick="replay()">↻ Replay</button>
</div>

<script>
  // Ivory / champagne palette only — no pinks, no reds
  const colors = ['#f0e4d0', '#e8dbc0', '#d6c298', '#b8a07a', '#f5ebd8', '#ddc89e'];

  function buildRain() {
    const rain = document.getElementById('rain');
    rain.innerHTML = '';
    // 8 petals only — sparse, like dust in afternoon light
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'fp';
      const left = Math.random() * 100;
      const dx = (Math.random() - 0.5) * 120;
      const duration = 18 + Math.random() * 10;   // 18–28 seconds each (very slow)
      const delay = Math.random() * 12;
      const size = 0.7 + Math.random() * 0.6;
      p.style.left = left + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.setProperty('--dx', dx + 'px');
      p.style.animationDuration = duration + 's';
      p.style.animationDelay = delay + 's';
      p.style.width = (12 * size) + 'px';
      p.style.height = (16 * size) + 'px';
      rain.appendChild(p);
    }
  }

  function replay() {
    const stage = document.getElementById('stage');
    const html = stage.innerHTML;
    stage.innerHTML = '';
    void stage.offsetWidth;
    stage.innerHTML = html;
    buildRain();
    stage.querySelector('.replay').onclick = replay;
  }

  buildRain();
</script>

</body>
</html>
